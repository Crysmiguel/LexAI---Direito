<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA na Advocacia — EXPOETEP 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --navy: #0D1B3E;
    --navy-light: #1A2D5A;
    --navy-mid: #152448;
    --gold: #C9A227;
    --gold-light: #E8C060;
    --gold-pale: #F5E9C0;
    --white: #FFFFFF;
    --off-white: #F8F6F0;
    --text-muted: #8A9BB5;
    --border: rgba(201,162,39,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--white);
    overflow-x: hidden;
  }

  /* HERO / HEADER NOVO */
  .hero {
    background: linear-gradient(170deg, #060E24 0%, #0D1B3E 40%, #091529 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 70% 40%, rgba(201,162,39,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 10% 80%, rgba(13,60,120,0.4) 0%, transparent 70%);
    pointer-events: none;
  }

  /* grid lines bg */
  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(201,162,39,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,162,39,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  /* TOP NAV inside hero */
  .hero-nav {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 48px;
    border-bottom: 1px solid rgba(201,162,39,0.12);
  }

  .hero-logo-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: -0.5px;
  }

  .hero-logo-text span { color: var(--gold); }

  .hero-nav-links {
    display: flex;
    gap: 4px;
  }

  .hero-nav-link {
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .hero-nav-link:hover { color: var(--white); background: rgba(255,255,255,0.06); }
  .hero-nav-link.active { color: var(--white); background: var(--gold); }

  /* HERO BODY */
  .hero-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 40px;
    position: relative;
    z-index: 2;
  }

  .hero-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(201,162,39,0.1);
    border: 1px solid rgba(201,162,39,0.35);
    border-radius: 100px;
    padding: 7px 18px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold-light);
    margin-bottom: 16px;
  }

  .hero-pill-dot {
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .hero-tags {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 40px;
  }

  .hero-tag {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 100px;
    padding: 5px 14px;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }

  .hero-title {
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(56px, 9vw, 110px);
    font-weight: 700;
    line-height: 0.95;
    color: var(--gold);
    margin-bottom: 8px;
    letter-spacing: -2px;
  }

  .hero-title-sub {
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(28px, 5vw, 60px);
    font-weight: 400;
    color: rgba(255,255,255,0.75);
    margin-bottom: 4px;
    letter-spacing: -1px;
  }

  .hero-title-sub2 {
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(28px, 5vw, 60px);
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    margin-bottom: 32px;
    letter-spacing: -1px;
  }

  .hero-desc {
    font-size: 16px;
    color: var(--text-muted);
    max-width: 520px;
    line-height: 1.7;
    margin-bottom: 48px;
  }

  .hero-stats {
    display: flex;
    gap: 56px;
    justify-content: center;
    margin-bottom: 48px;
  }

  .hero-stat-val {
    font-family: 'DM Sans', sans-serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: -1px;
  }

  .hero-stat-lbl {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .hero-btns {
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  .hero-btn-primary {
    background: var(--gold);
    border: none;
    color: var(--navy);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 14px 32px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .hero-btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,162,39,0.3); }

  .hero-btn-outline {
    background: transparent;
    border: 1px solid rgba(201,162,39,0.4);
    color: var(--gold-light);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 14px 32px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .hero-btn-outline:hover { background: rgba(201,162,39,0.08); border-color: var(--gold); transform: translateY(-2px); }

  /* STICKY NAV (visible after hero) */
  nav.sticky-nav {
    background: rgba(9,18,42,0.97);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(16px);
  }

  .nav-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px;
    display: flex;
    align-items: center;
    gap: 0;
  }

  .nav-logo {
    font-size: 16px;
    font-weight: 700;
    color: var(--white);
    margin-right: 24px;
    padding: 14px 0;
    white-space: nowrap;
  }

  .nav-logo span { color: var(--gold); }

  .nav-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 18px 18px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .nav-btn:hover { color: var(--gold-light); }
  .nav-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* ===== TIMELINE ===== */
  .timeline-outer {
    max-width: 760px;
    margin: 0 auto;
    position: relative;
  }

  .timeline-outer::before {
    content: '';
    position: absolute;
    left: 80px;
    top: 0; bottom: 0;
    width: 2px;
    background: linear-gradient(to bottom, transparent, var(--gold) 8%, var(--gold) 92%, transparent);
    opacity: 0.3;
  }

  .tl-item {
    display: flex;
    gap: 0;
    margin-bottom: 0;
    position: relative;
  }

  .tl-year-col {
    width: 80px;
    flex-shrink: 0;
    padding-top: 24px;
    padding-right: 20px;
    text-align: right;
  }

  .tl-year {
    font-size: 12px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.5px;
    line-height: 1.2;
  }

  .tl-dot-col {
    width: 28px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 24px;
  }

  .tl-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--gold);
    border: 2px solid var(--navy);
    box-shadow: 0 0 0 3px rgba(201,162,39,0.2);
    flex-shrink: 0;
    margin-top: 3px;
  }

  .tl-line {
    width: 2px;
    flex: 1;
    background: rgba(201,162,39,0.2);
    margin-top: 6px;
  }

  .tl-content {
    flex: 1;
    padding: 20px 0 32px 20px;
  }

  .tl-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .tl-desc {
    font-size: 13px;
    color: #9AAFC8;
    line-height: 1.7;
    margin-bottom: 12px;
  }

  .tl-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(201,162,39,0.08);
    border: 1px solid rgba(201,162,39,0.25);
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--gold-light);
    text-decoration: none;
    transition: all 0.2s;
  }

  .tl-link:hover { background: rgba(201,162,39,0.16); border-color: var(--gold); }

  /* APRESENTAÇÃO HERO */
  .apres-hero {
    background: linear-gradient(135deg, rgba(201,162,39,0.06) 0%, transparent 60%);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 48px;
    margin-bottom: 48px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 32px;
    align-items: center;
  }

  .apres-authors {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
  }

  .apres-author-chip {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 100px;
    padding: 5px 14px;
    font-size: 12px;
    color: #9AAFC8;
  }

  .apres-stat-box {
    background: rgba(201,162,39,0.08);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 32px;
    text-align: center;
    min-width: 180px;
  }

  /* MAIN */
  main { max-width: 1200px; margin: 0 auto; padding: 48px 40px 80px; display: none; }
  main.visible { display: block; }

  /* Hide sticky nav and footer until a section is opened */
  nav.sticky-nav { display: none; }
  nav.sticky-nav.visible { display: block; }
  footer { display: none; }
  footer.visible { display: block; }

  /* SECTION */
  .section {
    display: none;
    animation: fadeIn 0.35s ease;
  }
  .section.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-header {
    margin-bottom: 36px;
  }

  .section-tag {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(24px, 3vw, 38px);
    font-weight: 700;
    color: var(--white);
    line-height: 1.2;
  }

  .section-desc {
    margin-top: 12px;
    font-size: 15px;
    color: var(--text-muted);
    max-width: 600px;
    line-height: 1.6;
  }

  .gold-line {
    width: 48px;
    height: 3px;
    background: var(--gold);
    border-radius: 2px;
    margin-top: 16px;
  }

  /* ===== SEÇÃO 1: CHAT ===== */
  .chat-layout {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 24px;
    align-items: start;
  }

  .chat-box {
    background: var(--navy-light);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 520px;
  }

  .chat-top {
    background: rgba(201,162,39,0.08);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .chat-avatar {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .chat-name {
    font-weight: 600;
    font-size: 14px;
    color: var(--white);
  }

  .chat-status {
    font-size: 12px;
    color: #4ADE80;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .chat-status::before {
    content: '';
    width: 7px; height: 7px;
    background: #4ADE80;
    border-radius: 50%;
    display: inline-block;
  }

  .chat-messages {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: rgba(201,162,39,0.3); border-radius: 2px; }

  .msg {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.6;
  }

  .msg.user {
    align-self: flex-end;
    background: var(--gold);
    color: var(--navy);
    font-weight: 500;
    border-bottom-right-radius: 4px;
  }

  .msg.bot {
    align-self: flex-start;
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--border);
    color: var(--white);
    border-bottom-left-radius: 4px;
  }

  .msg.typing {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 18px;
  }

  .typing-dot {
    width: 7px; height: 7px;
    background: var(--gold);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  .chat-input-area {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
  }

  .chat-input {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .chat-input::placeholder { color: var(--text-muted); }
  .chat-input:focus { border-color: var(--gold); }

  .chat-send {
    width: 42px; height: 42px;
    background: var(--gold);
    border: none;
    border-radius: 10px;
    color: var(--navy);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.1s;
    font-weight: 700;
  }

  .chat-send:hover { background: var(--gold-light); transform: scale(1.05); }

  .chat-suggestions {
    background: var(--navy-light);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    max-height: 520px;
    overflow-y: auto;
  }

  .suggestions-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
  }

  .suggestion-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--white);
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 13px;
    cursor: pointer;
    margin-bottom: 8px;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    line-height: 1.4;
  }

  .suggestion-btn:hover {
    background: rgba(201,162,39,0.1);
    border-color: var(--gold);
    color: var(--gold-light);
  }

  .suggestion-btn:last-child { margin-bottom: 0; }

  /* ===== SEÇÃO 2: QUIZ ===== */
  .quiz-container {
    max-width: 720px;
    margin: 0 auto;
  }

  .quiz-progress-bar {
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    margin-bottom: 32px;
    overflow: hidden;
  }

  .quiz-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .quiz-card {
    background: var(--navy-light);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
  }

  .quiz-num {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--gold);
    margin-bottom: 14px;
  }

  .quiz-q {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--white);
    line-height: 1.4;
    margin-bottom: 28px;
  }

  .quiz-options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .quiz-opt {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 16px 20px;
    cursor: pointer;
    font-size: 15px;
    color: var(--white);
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .quiz-opt:hover:not(:disabled) {
    background: rgba(201,162,39,0.1);
    border-color: var(--gold);
  }

  .quiz-opt.correct {
    background: rgba(74,222,128,0.12) !important;
    border-color: #4ADE80 !important;
    color: #4ADE80;
  }

  .quiz-opt.wrong {
    background: rgba(248,113,113,0.12) !important;
    border-color: #F87171 !important;
    color: #F87171;
  }

  .quiz-opt:disabled { cursor: not-allowed; }

  .opt-letter {
    width: 28px; height: 28px;
    background: rgba(255,255,255,0.08);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .quiz-feedback {
    margin-top: 20px;
    padding: 16px 20px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    display: none;
  }

  .quiz-feedback.show { display: block; }
  .quiz-feedback.correct-fb { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: #86EFAC; }
  .quiz-feedback.wrong-fb { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: #FCA5A5; }

  .quiz-next {
    margin-top: 24px;
    background: var(--gold);
    border: none;
    color: var(--navy);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 14px 32px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    display: none;
  }

  .quiz-next.show { display: inline-block; }
  .quiz-next:hover { background: var(--gold-light); transform: translateY(-1px); }

  .quiz-result {
    text-align: center;
    padding: 56px 40px;
    background: var(--navy-light);
    border: 1px solid var(--border);
    border-radius: 20px;
    display: none;
  }

  .quiz-result.show { display: block; }

  .result-score {
    font-family: 'Playfair Display', serif;
    font-size: 72px;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
    margin: 16px 0;
  }

  .result-msg {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 12px;
  }

  .result-sub {
    font-size: 15px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 28px;
  }

  .result-restart {
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
