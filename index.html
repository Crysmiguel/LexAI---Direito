<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexAI — Validador DataJud</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #0B0F19;
            --bg-card: #151D30;
            --border: #24324F;
            --gold: #C9A227;
            --gold-hover: #E5B82B;
            --white: #FFFFFF;
            --text-muted: #94A3B8;
            --danger: #F87171;
            --success: #4ADE80;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* HERO VIEW */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px 8%;
            background: radial-gradient(circle at top right, rgba(199, 162, 39, 0.08), transparent 45%);
        }

        .hero-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hero-logo-text {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .hero-logo-text span {
            color: var(--gold);
            font-weight: 400;
        }

        .hero-nav-links {
            display: flex;
            gap: 20px;
        }

        .hero-nav-link {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .hero-nav-link:hover, .hero-nav-link.active {
            color: var(--white);
        }

        .hero-body {
            max-width: 700px;
            margin: auto 0;
        }

        .hero-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(199, 162, 39, 0.1);
            border: 1px solid rgba(199, 162, 39, 0.2);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: var(--gold);
            font-weight: 600;
            margin-bottom: 25px;
        }

        .hero-pill-dot {
            width: 6px;
            height: 6px;
            background: var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--gold);
        }

        .hero-title {
            font-size: 56px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 10px;
        }

        .hero-title-sub {
            font-size: 28px;
            color: var(--gold);
            font-weight: 400;
            margin-bottom: 5px;
        }

        .hero-title-sub2 {
            font-size: 18px;
            color: var(--text-muted);
            font-weight: 300;
            margin-bottom: 20px;
        }

        .hero-desc {
            color: var(--text-muted);
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .hero-btns {
            display: flex;
            gap: 15px;
        }

        .hero-btn-primary {
            background: var(--gold);
            color: var(--bg-main);
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .hero-btn-primary:hover {
            background: var(--gold-hover);
            transform: translateY(-2px);
        }

        .apres-stat-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            width: 200px;
        }

        .hero-stat-val {
            font-size: 42px;
            font-weight: 800;
            color: var(--gold);
        }

        .hero-stat-lbl {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        /* STICKY NAV */
        .sticky-nav {
            position: sticky;
            top: 0;
            background: rgba(11, 15, 25, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
            display: none;
        }

        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            height: 70px;
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .nav-logo {
            font-size: 20px;
            font-weight: 800;
            margin-right: auto;
        }

        .nav-logo span {
            color: var(--gold);
            font-weight: 400;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            height: 100%;
            padding: 0 5px;
            position: relative;
            transition: color 0.2s;
        }

        .nav-btn:hover, .nav-btn.active {
            color: var(--white);
        }

        .nav-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--gold);
        }

        /* Botão Admin Oculto por Padrão */
        #btn-admin {
            display: none;
            color: #A7F3D0;
            border: 1px dashed rgba(74, 222, 128, 0.3);
            padding: 6px 12px;
            border-radius: 6px;
            height: auto;
            align-self: center;
        }
        
        #btn-admin:hover {
            background: rgba(74, 222, 128, 0.1);
            color: var(--success);
        }

        /* MAIN CONTENT STRUCTURE */
        main {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 40px 20px;
            flex: 1;
            display: none;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-header {
            margin-bottom: 35px;
        }

        .section-tag {
            color: var(--gold);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
        }

        .section-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .section-desc {
            color: var(--text-muted);
            font-size: 15px;
            max-width: 800px;
            line-height: 1.6;
        }

        .gold-line {
            width: 60px;
            height: 3px;
            background: var(--gold);
            margin-top: 15px;
            border-radius: 2px;
        }

        /* APRESENTACAO STYLE */
        .apres-hero {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            gap: 40px;
        }

        .apres-authors {
            margin-top: 25px;
        }

        .apres-author-chip {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* QUIZ LAYOUT */
        .quiz-container {
            max-width: 850px;
            margin: 0 auto;
        }

        .quiz-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 35px;
        }

        .quiz-num {
            font-size: 13px;
            color: var(--gold);
            font-weight: 700;
            margin-bottom: 10px;
        }

        .quiz-q {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .quiz-opt {
            background: rgba(0,0,0,0.15);
            border: 1px solid var(--border);
