        :root {
            --bg-main: #0B0F19;
            --bg-card: #151D30;

            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

            background-color: var(--bg-main);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

            background: radial-gradient(circle at top right, rgba(199, 162, 39, 0.08), transparent 45%);

            justify-content: space-between;
            align-items: center;
        }

            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .hero-logo-text span {
            color: var(--gold);
            font-weight: 400;
        }

        .hero-body {
            max-width: 750px;
            margin: auto 0;
        }

        .hero-pill {

            align-items: center;

            border: 1px solid rgba(199, 162, 39, 0.2);

            font-size: 12px;
            color: var(--gold);
            font-weight: 600;
            margin-bottom: 25px;
        }

            width: 6px;
            height: 6px;
            background: var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--gold);
        }
